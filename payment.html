<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | Vlora Labs</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f8fafc;
padding:40px;
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:15px;
border:1px solid #e5e7eb;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#00B8FF;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

h1{
color:#00B8FF;
}

</style>
</head>

<body>

<h1>Payment Method</h1>

<div class="card">

<h3>Order Total</h3>

<div id="total">
AED 0
</div>

</div>

<h3>Select Payment Method</h3>

<button onclick="paypalPayment()">
PayPal
</button>

<button onclick="applePay()">
Apple Pay
</button>

<button onclick="creditCardPayment()">
Credit / Debit Card
</button>

<button onclick="bankTransfer()">
Bank Transfer
</button>

<button onclick="whatsappPayment()">
WhatsApp Payment Arrangement
</button>

<button onclick="cashOnDelivery()">
Cash on Delivery (+ AED 30)
</button>

</div>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(item=>{
total += item.price * item.quantity;
});

document.getElementById("total").innerHTML =
"AED " + total;

function paypalPayment(){

window.open(
"https://paypal.me/YOURPAYPALNAME",
"_blank"
);

}

function applePay(){

alert(
"Apple Pay will be available soon. Please choose WhatsApp Payment Arrangement for now."
);

}

function creditCardPayment(){

alert(
"Credit Card payments coming soon."
);

}

function bankTransfer(){

alert(
"Bank Transfer selected. We will send bank details after order confirmation."
);

}

function whatsappPayment(){

window.open(
"https://wa.me/971502307917",
"_blank"
);

}

function cashOnDelivery(){

alert(
"Cash on Delivery selected. AED 30 COD fee will be added."
);

}

</script>

</body>
</html>
