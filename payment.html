<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | Vlora Labs</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f8fafc;
padding:40px;
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:15px;
border:1px solid #e5e7eb;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#00B8FF;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

h1{
color:#00B8FF;
}

</style>
</head>

<body>

<a href="checkout.html" style="
text-decoration:none;
color:#00B8FF;
font-weight:bold;
display:inline-block;
margin-bottom:20px;
font-size:18px;
">
← Back to Checkout
</a>

<h1>Payment Method</h1>

<div class="card">

<h3>Order Total</h3>

<div id="total">
AED 0
</div>

</div>

<h3>Select Payment Method</h3>

<button onclick="applePay()">
Apple Pay / Card Payment
</button>

<button onclick="whatsappPayment()">
WhatsApp Payment Arrangement
</button>
  
<button onclick="bankTransfer()">
Bank Transfer
</button>

<button onclick="cashOnDelivery()">
Cash on Delivery (+ AED 30)
</button>

</div>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(item=>{
total += item.price * item.quantity;
});

document.getElementById("total").innerHTML =
"AED " + total;

function applePay(){

window.open(
"https://pay.ziina.com/vloralabs?source=app",
"_blank"
);

}


function bankTransfer(){

alert(
`Bank Transfer Details

Bank: First Abu Dhabi Bank (FAB)
Account Name: Mariam
IBAN: AE210355640011969654423

After payment, send the receipt on WhatsApp:
+971502307917`
);

}
  
function whatsappPayment(){

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let message =
"Hello Vlora Labs,%0A%0A";

message += "I would like to place an order:%0A%0A";

let total = 0;

cart.forEach(item=>{

message +=
"- " + item.name +
" x" + item.quantity +
" (AED " +
(item.price * item.quantity) +
")%0A";

total += item.price * item.quantity;

});

message +=
"%0AOrder Total: AED " +
total;

window.open(
"https://wa.me/971502307917?text=" + message,
"_blank"
);

}

function cashOnDelivery(){

alert(
"Cash on Delivery selected. AED 30 COD fee will be added."
);

}

</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "PASTE YOUR API KEY HERE",
authDomain: "vloralabs.firebaseapp.com",
projectId: "vloralabs",
storageBucket: "vloralabs.firebasestorage.app",
messagingSenderId: "885798615346",
appId: "PASTE YOUR APP ID HERE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveOrder = async function(paymentMethod){

const orderInfo =
JSON.parse(localStorage.getItem("orderInfo")) || {};

const cart =
JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(item=>{
total += item.price * item.quantity;
});

await addDoc(
collection(db,"orders"),
{
orderNumber:
"VL" + Date.now(),

paymentMethod,

customer: orderInfo,

items: cart,

total,

status: "Pending",

createdAt: new Date().toISOString()
}
);

};

</script>
</body>
</html>
