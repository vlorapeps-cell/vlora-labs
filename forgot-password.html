<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
</head>

<body style="
font-family:Arial;
max-width:500px;
margin:100px auto;
padding:20px;
">

<h1>Reset Password</h1>

<input
type="email"
id="email"
placeholder="Email Address"
style="
width:100%;
padding:15px;
margin-bottom:15px;
">

<button
id="resetBtn"
style="
width:100%;
padding:15px;
background:#00B8FF;
color:white;
border:none;
">
Send Reset Email
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
getAuth,
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAtzeg8eRn0iPnTVvhlzZNZKC-UqtgrFnk",
authDomain: "vloralabs.firebaseapp.com",
projectId: "vloralabs",
storageBucket: "vloralabs.firebasestorage.app",
messagingSenderId: "885798615346",
appId: "1:885798615346:web:3513704c3c4fd291a2ff2b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("resetBtn").addEventListener("click", async () => {

const email =
document.getElementById("email").value;

try {

  await sendPasswordResetEmail(auth, email);

  alert("Password reset email sent.");

} catch (error) {

  alert(error.message);

}
});

</script>

</body>
</html>
