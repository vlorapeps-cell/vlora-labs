<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart | Vlora Labs</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f8fafc;
margin:0;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
color:#00B8FF;
margin-bottom:30px;
}

.cart-item{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 4px 15px rgba(0,0,0,.05);
display:flex;
justify-content:space-between;
align-items:center;
}

.total{
font-size:28px;
font-weight:bold;
margin-top:30px;
color:#00B8FF;
}

.btn{
background:#00B8FF;
color:white;
padding:12px 25px;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>🛒 Shopping Cart</h1>

<div id="cartItems"></div>

<div class="total" id="cartTotal">
Total: AED 0
</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
  
console.log(cart);

let cartItems = document.getElementById("cartItems");
let total = 0;

cart.forEach((item,index)=>{

total += item.price;

cartItems.innerHTML += `
<div class="cart-item">

<div style="display:flex;align-items:center;gap:15px;">

<img
src="${item.image}"
style="
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
">

<div>
<h3>${item.name}</h3>
<p>AED ${item.price}</p>
</div>

</div>

<button class="btn" onclick="removeItem(${index})">
Remove
</button>

</div>
`;
document.getElementById("cartTotal").innerHTML =
"Total: AED " + total;

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

location.reload();

}

</script>

</body>
</html>
