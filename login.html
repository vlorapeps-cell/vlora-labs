<!DOCTYPE html>
<html>
<head>
<title>Vlora Labs Login</title>
</head>

<body>
<div style="
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f8fafc;
padding:20px;
">

<div style="
background:white;
padding:50px;
border-radius:25px;
box-shadow:0 15px 50px rgba(0,0,0,.08);
width:100%;
max-width:450px;
text-align:center;
">
<h1 style="
font-size:42px;
color:#00B8FF;
margin-bottom:10px;
">
VLORA LABS
</h1>

<p style="
color:#6b7280;
margin-bottom:30px;
">
Sign in or create an account
</p>

<button id="googleLogin">
Continue with Google
</button>

<br><br>

<input type="email" id="email" placeholder="Email">

<br><br>

<input type="password" id="password" placeholder="Password">

<br><br>

<button id="signup">
Create Account
</button>

<button id="login">
Login
</button>
  
</div>
</div>
  
</body>
</html>
