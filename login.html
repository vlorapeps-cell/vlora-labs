<!DOCTYPE html>
<html>
<head>
<title>Vlora Labs Login</title>
</head>

<body>
<div style="
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:white;
padding-left:20px;
padding-right:20px;
padding-bottom:20px;
">

<div style="
width:100%;
max-width:520px;
text-align:left;
margin:auto;
">
  
<div style="text-align:center;">
<img
src="logo.png"
alt="Vlora Labs Logo"
style="
height:140px;
width:auto;
margin-bottom:30px;
">
</div>

<h1 style="
font-size:54px;
font-weight:700;
color:#111827;
margin-bottom:10px;
text-align:center;
">
Sign in
</h1>
  
<p style="
color:#6b7280;
margin-bottom:30px;
text-align:center;
">
Sign in or create an account
</p>

<button id="googleLogin" style="
width:100%;
padding:15px;
border:1px solid #d1d5db;
border-radius:12px;
background:white;
color:#111827;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-bottom:20px;
">
Continue with Google
</button>
<div style="
display:flex;
align-items:center;
margin:20px 0;
">

<div style="
flex:1;
height:1px;
background:#e5e7eb;
"></div>

<span style="
padding:0 15px;
color:#9ca3af;
font-size:14px;
">
OR
</span>

<div style="
flex:1;
height:1px;
background:#e5e7eb;
"></div>

</div>
<br><br>

<div style="
display:flex;
align-items:center;
border:1px solid #d1d5db;
border-radius:12px;
padding:15px 20px;
">

<input
type="email"
id="email"
placeholder="Email"
style="
flex:1;
border:none;
outline:none;
font-size:16px;
">

<button id="emailContinue" style="
border:none;
background:none;
font-size:28px;
cursor:pointer;
color:#111827;
">
→
</button>

</div>
<br><br>

<p style="
text-align:center;
font-size:14px;
color:#6b7280;
margin-top:25px;
line-height:1.6;
">
By continuing, you agree to our
<a href="terms.html" style="color:#111827;">
Terms of Service
</a>
and
<a href="privacy.html" style="color:#111827;">
Privacy Policy
</a>
</p> 
</div>
</div>
  
</body>
</html>
