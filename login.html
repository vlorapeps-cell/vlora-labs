<!DOCTYPE html>
<html>
<head>
<title>Vlora Labs Login</title>
</head>

<body>
<div style="
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:80px;
background:white;
padding-left:20px;
padding-right:20px;
padding-bottom:20px;
">

<div style="
width:100%;
max-width:520px;
text-align:left;
">
  
<img
src="logo.png"
alt="Vlora Labs Logo"
style="
height:120px;
width:auto;
margin-bottom:20px;
">
  
<h1 style="
font-size:42px;
color:#00B8FF;
margin-bottom:10px;
">
VLORA LABS
</h1>

<p style="
color:#6b7280;
margin-bottom:30px;
">
Sign in or create an account
</p>

<button id="googleLogin" style="
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#00B8FF;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-bottom:20px;
">
Continue with Google
</button>
<div style="
display:flex;
align-items:center;
margin:20px 0;
">

<div style="
flex:1;
height:1px;
background:#e5e7eb;
"></div>

<span style="
padding:0 15px;
color:#9ca3af;
font-size:14px;
">
OR
</span>

<div style="
flex:1;
height:1px;
background:#e5e7eb;
"></div>

</div>
<br><br>

<input
type="email"
id="email"
placeholder="Email"
style="
width:100%;
padding:15px;
border:1px solid #e5e7eb;
border-radius:12px;
font-size:15px;
">
<br><br>

<input
type="password"
id="password"
placeholder="Password"
style="
width:100%;
padding:15px;
border:1px solid #e5e7eb;
border-radius:12px;
font-size:15px;
">

<br><br>

<button id="signup" style="
width:100%;
padding:15px;
background:#00B8FF;
color:white;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-bottom:12px;
">
Create Account
</button>

<button id="login" style="
width:100%;
padding:15px;
background:white;
color:#00B8FF;
border:2px solid #00B8FF;
border-radius:12px;
font-weight:bold;
cursor:pointer;
">
Login
</button>
  
</div>
</div>
  
</body>
</html>
